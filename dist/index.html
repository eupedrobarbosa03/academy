<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy</title>
    
    <link rel="shortcut icon" href="assets/icons/gym.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/config.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> 
    <script type="module" src="js/index.js" defer></script>
    <script type="module" src="js/change-section.js" defer></script>
    <script type="module" src="js/menu-mobile.js" defer></script>
    <script type="module" src="js/change-theme.js"></script>
</head>
<body>
    <header class="header-container-academy">
        <i class="fa-solid fa-bars" id="menu-navbar"></i>
        <div class="title-container">
            <img src="assets/icons/academy_icon_dark.png" id="icon-academy" width="36" height="36" alt="academy icon">
            <h2>Academy</h2>
        </div>
        <div class="container-greet-user-more-change-theme">
            <button data-change-theme id="button-change-theme">
                <i id="icon-change-theme" class="fa-solid fa-moon moon"></i>
            </button>
            <p class="user">USER</p>
            <div class="container-profile">
                <p>U</p>
            </div>
        </div>
    </header>
    <main class="main-container-academy">

            <button class="button-option" id="dashboard">Dashboard</button>
            <button class="button-option" id="academy-workouts">Treinos</button>
            <button class="button-option" id="academy-students">Alunos</button>
            <button class="button-option" id="academy-instructors">Instrutores</button>
        </nav>
        <section data-section="dashboard" class="section-option" style="display: none;">
            <section class="section-container-informations-academy">

                </div>
                <div class="box-information">
                    <h2>Total de Treinos</h2>
                    <p id="total-workouts" class="total">10</p>
                </div>
                <div class="box-information" id="container-total-payment-students">
                    <h2>r$ total dos alunos</h2>
                    <p id="payment-students" class="total total-payment">R$ 1.000,00</p>
                </div>
                <div class="box-information" id="container-total-payment-instructors">
                    <h2>Pagamento total aos instrutores</h2>
                    <p id="payment-students" class="total total-payment">R$ 1.000,00</p>
                </div>
            </section>
        </section>
        <section data-section="academy-workouts" class="section-option section-academy-workouts">
            <div class="container-actions-workouts">
                <div>adsadsa</div>

            <h2 class="title-section">Alunos</h2>
        </section>
        <section data-section="academy-instructors" class="section-option" style="display: none;">
