<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive/mobile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Academy Control</title>
</head>
<body>

    <p>teste</p>

    <main id="main-container">
        <header id="header-container">
            <h2 id="title-academy-header">Academy<span>js</span></h2>

            <nav id="navbar-container-options-control">
                <button id="button-workouts" class="button-style">Workouts</button>
                <button id="button-instructor" class="button-style">Instructor</button>
                <button id="button-student" class="button-style">Student</button>
            </nav>
        </header>

        <section id="section-control">
            <header id="header-container-section-control">
                <nav id="navbar-container-options-control-section">
                    <button id="button-add" class="button-style">add</button>
                    <button id="button-update" class="button-style">update</button>
                    <button id="button-delete" class="button-style">delete</button>
                    <button id="button-view-all" class="button-style">all</button>
                </nav>
                <h2 id="title-option-selected"></h2>
            </header>

            <section class="section-box-control">

                <section id="section-control-workouts">
                    
                    <div class="box-model-container-input">
                        <input type="text" id="name-instructor-for-workout" placeholder="Instructor name">
                        <input type="text" id="name-student-for-workout" placeholder="Student name">
                    </div>

                    <div class="box-model-container-input">
                        <input type="text" id="time-for-workout" placeholder="Time workout">
                        <input type="text" id="day-for-workout" placeholder="Day workout">
                    </div>

                </section>

                <section id="section-control-instructor">

                    <div class="box-model-container-input">
                        <input type="text" id="name-instructor" placeholder="Instructor name">
                        <input type="text" id="age-instructor" placeholder="Instructor age">
                    </div>

                    <div class="box-model-container-input">
                        <input type="text" id="specialty" placeholder="Specialty">
                        <input type="text" id="telephone" placeholder="Telephone">
                    </div>

                </section>

                <section id="section-control-student">

                    <div class="box-model-container-input">
                        <input type="text" id="name-student" placeholder="Student name">
                        <input type="text" id="age-student" placeholder="Student age">
                    </div>

                    <div class="box-model-container-input">
                        <input type="text" id="focus" placeholder="Student Focus">
                        <input type="text" id="type-of-benefit" placeholder="Type of Benefit">
                    </div>

                    <div class="box-model-container-input">
                        <input type="text" id="weight-student" placeholder="Student weight">
                    </div>

                </section>


            </section>

            <p id="message-info"></p>

            <button class="button-confirm-control button-style">
                Confirm
            </button>

        </section>

        <section class="section-view-all">

            <i class="fa-solid fa-xmark icon-leave"></i>

            <section id="section-container-list-all-workouts">
                <h2>Workouts</h2>

                <div id="container-list-workouts">
                    <ul id="list-workouts">
                    </ul>
                </div>

            </section>

            <section id="section-container-list-all-instructors">
                <h2>Instructors</h2>

                <div id="container-list-instructor">
                    <ul id="list-instructors">
                    </ul>
                </div>

            </section>

            <section id="section-container-list-all-students">
                <h2>Students</h2>

                <div id="container-list-student">
                    <ul id="list-students">
                    </ul>
                </div>

            </section>

        </section>

    </main>

    <script type="module" src="js/main.js"></script>
    
</body>
</html>
